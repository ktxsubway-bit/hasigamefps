<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 바다 물총 대전 - 멀티플레이어</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            width: calc(100% - 40px);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #ff0000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            display: none;
            text-align: center;
            z-index: 100;
            min-width: 300px;
            border: 1px solid #444;
        }
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background 0.1s;
            z-index: 50;
        }
        .hp-bar-container {
            width: 200px;
            height: 16px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 5px;
        }
        #hp-fill {
            width: 100%;
            height: 100%;
            background: #22c55e;
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div id="damage-flash"></div>
<div id="ui">
    <div class="flex justify-between items-start">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">WATER SURVIVAL</h1>
            <div id="online-count" class="text-sm font-medium text-blue-300">연결 확인 중...</div>
            <div class="mt-4 bg-black/30 p-2 rounded-lg inline-block">
                <span class="text-xs font-bold uppercase opacity-70">Internal HP System</span>
                <div class="hp-bar-container">
                    <div id="hp-fill"></div>
                </div>
            </div>
        </div>
        <div class="text-right">
            <div id="score-board" class="text-4xl font-black text-yellow-400 drop-shadow-md">0</div>
            <div class="text-xs uppercase font-bold opacity-70">Score Points</div>
            <div id="ammo-ui" class="mt-2 text-xl font-mono font-bold text-cyan-400">AMMO: 30 / 30</div>
        </div>
    </div>
</div>

<div id="crosshair"></div>
<div id="status-msg">
    <div id="msg-text" class="text-xl font-bold mb-4">서버 연결 중...</div>
    <div id="waiting-spinner" class="h-10 w-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
    <button id="retry-btn" class="mt-6 bg-cyan-600 hover:bg-cyan-500 text-white font-bold px-8 py-3 rounded-full transition-all hidden" onclick="location.reload()">다시 참가하기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, serverTimestamp, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDq2XKX-WD5Igl9GxoQ7lxiyjdZoXxEl_E",
        authDomain: "watergun-2c1d9.firebaseapp.com",
        projectId: "watergun-2c1d9",
        storageBucket: "watergun-2c1d9.firebasestorage.app",
        messagingSenderId: "186215519097",
        appId: "1:186215519097:web:542176191999aee8f115a8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "watergun-survival-v3"; // 버전업을 통한 DB 격리

    let scene, camera, renderer, clock;
    let players = {};
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let yaw = 0, pitch = 0;
    let userId = null;
    let score = 0;
    let hp = 100;
    let isGameOver = false;
    let isWaiting = true;
    let myGun;

    const MAX_AMMO = 30;
    let ammo = MAX_AMMO;
    let isReloading = false;
    const ISLAND_SIZE = 70;
    const MAX_PLAYERS = 30;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(freq, type = 'triangle', duration = 0.1, vol = 0.2) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function createWaterGun() {
        const gunGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0x00aaff }));
        gunGroup.add(body);
        const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 16), new THREE.MeshStandardMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.8 }));
        tank.rotation.x = Math.PI / 2; tank.position.y = 0.1; tank.position.z = -0.1;
        gunGroup.add(tank);
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.12), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        handle.position.y = -0.15; handle.position.z = 0.15;
        gunGroup.add(handle);
        return gunGroup;
    }

    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 50, 200);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(100, 200, 100);
        scene.add(sunLight);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        myGun = createWaterGun();
        scene.add(myGun);
        myGun.visible = false;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Ground
        const islandGeo = new THREE.CircleGeometry(ISLAND_SIZE, 64);
        const islandMat = new THREE.MeshStandardMaterial({ color: 0xe3c5a8, roughness: 0.8 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.rotation.x = -Math.PI / 2;
        scene.add(island);

        // Sea
        const waterGeo = new THREE.PlaneGeometry(3000, 3000);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x006994, transparent: true, opacity: 0.7 });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = -0.6;
        scene.add(water);

        clock = new THREE.Clock();

        window.addEventListener('resize', onWindowResize);
        document.addEventListener('keydown', (e) => updateKey(e.code, true));
        document.addEventListener('keyup', (e) => updateKey(e.code, false));
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mousedown', (e) => { if(e.button === 0) shootWater(); });
        
        // 브라우저 종료 시 즉시 데이터 삭제
        window.addEventListener('beforeunload', cleanupPlayer);

        renderer.domElement.onclick = () => {
            if (!isGameOver && !isWaiting) renderer.domElement.requestPointerLock();
        };

        showStatus("데이터 동기화 중...", true);
        await signInAnonymously(auth).catch(err => showStatus("인증 실패: " + err.message));
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                startNetworkLoop();
            }
        });

        animate();
    }

    function startNetworkLoop() {
        const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
        
        onSnapshot(playersCol, (snapshot) => {
            const currentPlayers = snapshot.docs.map(doc => doc.data());
            const currentCount = snapshot.size;
            document.getElementById('online-count').innerText = `LIVE PLAYERS: ${currentCount} / ${MAX_PLAYERS}`;
            
            const now = Date.now();
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                
                // 내 정보 업데이트
                if (data.id === userId) {
                    if (data.hp !== undefined && data.hp < hp) {
                        flashDamage();
                        hp = data.hp;
                        updateHPUI();
                        if (hp <= 0) die("물총 공격을 견디지 못했습니다!");
                    }
                    return;
                }

                if (change.type === "added") {
                    createOtherPlayer(data);
                } else if (change.type === "modified") {
                    updateOtherPlayer(data);
                } else if (change.type === "removed") {
                    removeOtherPlayer(data.id);
                }
            });

            // 유령 플레이어 서버측 제거 (5초 이상 무응답)
            snapshot.docs.forEach(async (docSnap) => {
                const p = docSnap.data();
                if (p.lastSeen) {
                    const lastTime = p.lastSeen.toMillis ? p.lastSeen.toMillis() : Date.now();
                    if (Date.now() - lastTime > 6000) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id)).catch(()=>{});
                    }
                }
            });

            // 게임 참여 여부 확인
            const amIInDB = snapshot.docs.some(doc => doc.id === userId);
            if (!amIInDB && !isGameOver) {
                if (currentCount < MAX_PLAYERS) joinGame();
                else showStatus("서버가 가득 찼습니다. 잠시 대기하세요...", true);
            } else if (amIInDB) {
                hideStatus();
                isWaiting = false;
                myGun.visible = true;
            }
        }, (error) => {
            console.error("Snapshot Error:", error);
        });
    }

    async function joinGame() {
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', userId);
        const spawnRange = ISLAND_SIZE * 0.4;
        const startPos = { x: (Math.random()-0.5)*spawnRange, y: 1.6, z: (Math.random()-0.5)*spawnRange };
        camera.position.set(startPos.x, startPos.y, startPos.z);
        hp = 100;
        score = 0;
        updateHPUI();
        
        await setDoc(playerRef, { 
            id: userId, 
            pos: startPos, 
            rot: 0, 
            score: 0, 
            hp: 100, 
            lastSeen: serverTimestamp() 
        });
        
        startSyncInterval(playerRef);
    }

    function startSyncInterval(playerRef) {
        const timer = setInterval(async () => {
            if (isGameOver || isWaiting) { clearInterval(timer); return; }
            await updateDoc(playerRef, {
                pos: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                rot: yaw,
                lastSeen: serverTimestamp()
            }).catch(() => { clearInterval(timer); });
        }, 150); // 부하를 줄이기 위해 약간 완화
    }

    async function cleanupPlayer() {
        if (userId) {
            // Firestore는 비동기이므로 Beacon 대신 짧은 동기 요청 시도
            const playerPath = `artifacts/${appId}/public/data/players/${userId}`;
            // 실제 삭제는 Snapshot Listeners의 유령 제거 로직이 최종 보장함
        }
    }

    function createOtherPlayer(data) {
        if (players[data.id]) return;
        const group = new THREE.Group();
        
        // 피격 판정을 위해 Mesh에 ID 부여
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        head.position.y = 1.6;
        head.name = "hitbox_" + data.id;
        group.add(head);
        
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.0, 12), bodyMat);
        body.position.y = 0.8;
        body.name = "hitbox_" + data.id;
        group.add(body);
        
        const gun = createWaterGun();
        gun.position.set(0.35, 1.2, -0.4);
        group.add(gun);
        
        group.position.set(data.pos.x, 0, data.pos.z);
        scene.add(group);
        players[data.id] = { mesh: group, id: data.id };
    }

    function updateOtherPlayer(data) {
        const p = players[data.id];
        if (p) {
            p.mesh.position.lerp(new THREE.Vector3(data.pos.x, 0, data.pos.z), 0.25);
            p.mesh.rotation.y = data.rot;
        }
    }

    function removeOtherPlayer(id) {
        if (players[id]) {
            scene.remove(players[id].mesh);
            delete players[id];
        }
    }

    function shootWater() {
        if (!document.pointerLockElement || isGameOver || isWaiting || isReloading) return;
        if (ammo <= 0) { reload(); return; }

        ammo--;
        document.getElementById('ammo-ui').innerText = `AMMO: ${ammo} / ${MAX_AMMO}`;
        playSound(600, 'triangle', 0.08, 0.15);
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        
        // Visual Stream
        const streamGeo = new THREE.CylinderGeometry(0.02, 0.02, 20, 6);
        const streamMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.4 });
        const stream = new THREE.Mesh(streamGeo, streamMat);
        stream.position.copy(camera.position).add(dir.clone().multiplyScalar(10));
        stream.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        scene.add(stream);
        setTimeout(() => scene.remove(stream), 40);

        // Raycasting for hit
        const raycaster = new THREE.Raycaster(camera.position, dir);
        const targetMeshes = [];
        Object.values(players).forEach(p => {
            p.mesh.children.forEach(child => {
                if (child.name.startsWith("hitbox_")) targetMeshes.push(child);
            });
        });

        const intersects = raycaster.intersectObjects(targetMeshes);
        if (intersects.length > 0) {
            const hitId = intersects[0].object.name.replace("hitbox_", "");
            if (hitId) applyDamageToOther(hitId);
        }
    }

    async function applyDamageToOther(targetId) {
        const targetRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', targetId);
        
        try {
            // Transaction을 사용하여 동시 수정 문제 해결
            await runTransaction(db, async (transaction) => {
                const sfDoc = await transaction.get(targetRef);
                if (!sfDoc.exists()) return;
                
                const newHP = (sfDoc.data().hp || 100) - 10;
                transaction.update(targetRef, { hp: newHP });
                
                // 내 점수 업데이트
                score += 10;
                document.getElementById('score-board').innerText = score;
                playSound(800, 'sine', 0.05, 0.1);
            });
        } catch (e) {
            console.error("Damage Transaction Failed: ", e);
        }
    }

    function flashDamage() {
        const flash = document.getElementById('damage-flash');
        flash.style.background = "rgba(255, 0, 0, 0.5)";
        setTimeout(() => flash.style.background = "rgba(255, 0, 0, 0)", 100);
        playSound(120, 'sawtooth', 0.2, 0.3);
    }

    function updateHPUI() {
        const fill = document.getElementById('hp-fill');
        fill.style.width = hp + "%";
        if (hp <= 30) fill.style.background = "#ef4444";
        else if (hp <= 60) fill.style.background = "#eab308";
        else fill.style.background = "#22c55e";
    }

    function reload() {
        if (isReloading || ammo === MAX_AMMO) return;
        isReloading = true;
        document.getElementById('ammo-ui').innerText = "RELOADING...";
        playSound(300, 'square', 0.5, 0.1);
        setTimeout(() => {
            ammo = MAX_AMMO;
            isReloading = false;
            document.getElementById('ammo-ui').innerText = `AMMO: ${ammo} / ${MAX_AMMO}`;
        }, 1200);
    }

    function die(reason) {
        if (isGameOver) return;
        isGameOver = true;
        showStatus(`ELIMINATED<br><span class='text-sm font-normal opacity-70'>${reason}</span>`, false);
        document.getElementById('retry-btn').classList.remove('hidden');
        document.exitPointerLock();
        
        if (userId) {
            deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', userId)).catch(()=>{});
        }
    }

    function updateKey(code, isPressed) {
        if (isPressed && code === 'KeyR') reload();
        switch(code) {
            case 'KeyW': moveForward = isPressed; break;
            case 'KeyS': moveBackward = isPressed; break;
            case 'KeyA': moveLeft = isPressed; break;
            case 'KeyD': moveRight = isPressed; break;
        }
    }

    function onMouseMove(event) {
        if (document.pointerLockElement && !isGameOver && !isWaiting) {
            yaw -= event.movementX * 0.002;
            pitch -= event.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function showStatus(msg, showSpinner = false) {
        const el = document.getElementById('status-msg');
        el.style.display = 'block';
        document.getElementById('msg-text').innerHTML = msg;
        document.getElementById('waiting-spinner').style.display = showSpinner ? 'block' : 'none';
    }

    function hideStatus() {
        document.getElementById('status-msg').style.display = 'none';
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isGameOver) { renderer.render(scene, camera); return; }
        
        const delta = clock.getDelta();

        if (document.pointerLockElement && !isWaiting) {
            const speed = 9;
            const dir = new THREE.Vector3();
            if (moveForward) dir.z -= 1;
            if (moveBackward) dir.z += 1;
            if (moveLeft) dir.x -= 1;
            if (moveRight) dir.x += 1;
            dir.normalize().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw));
            camera.position.add(dir.multiplyScalar(speed * delta));
            
            // Boundary & Death Check
            const dist = Math.sqrt(camera.position.x**2 + camera.position.z**2);
            if (dist > ISLAND_SIZE) {
                camera.position.y -= 0.25;
                if (camera.position.y < -6) die("섬 밖으로 떨어졌습니다!");
            } else {
                camera.position.y = 1.6;
            }

            camera.rotation.set(0, 0, 0);
            camera.rotateY(yaw); 
            camera.rotateX(pitch);

            if (myGun) {
                myGun.position.copy(camera.position);
                myGun.quaternion.copy(camera.quaternion);
                myGun.translateZ(-0.4); myGun.translateX(0.28); myGun.translateY(-0.28);
            }
        }
        renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
