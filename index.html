<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 바다 물총 대전 - 멀티플레이어</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 30px;
            border-radius: 15px;
            display: none;
            text-align: center;
            z-index: 100;
            min-width: 300px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #ammo-ui {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ccff;
        }
        .reloading {
            color: #ffcc00 !important;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="ui">
    <h1 class="text-2xl font-bold">🏝️ 대형 아일랜드 물총 대전</h1>
    <div id="score-board" class="mt-2 text-lg">점수: 0</div>
    <div id="ammo-ui" class="mt-1">탄약: 30 / 30</div>
    <div id="online-count" class="text-sm opacity-80">접속 중인 플레이어: 0 / 30</div>
</div>

<div id="crosshair"></div>
<div id="status-msg">
    <div id="msg-text">연결 중...</div>
    <div id="waiting-spinner" class="spinner" style="display:none;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, getDocs, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Configuration ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'water-gun-island-v2';

    let scene, camera, renderer, clock;
    let players = {}; // 다른 플레이어 메쉬 저장 객체
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let yaw = 0, pitch = 0;
    let userId = null;
    let score = 0;
    let isGameOver = false;
    let isWaiting = true;
    let myGun;

    const MAX_AMMO = 30;
    let ammo = MAX_AMMO;
    let isReloading = false;

    const ISLAND_SIZE = 70; 
    const MAX_PLAYERS = 30;

    // --- Audio Synthesis ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playShootSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playReloadSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playSplashSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.5);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start();
    }

    function createWaterGun() {
        const gunGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0x00aaff }));
        gunGroup.add(body);
        const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 16), new THREE.MeshStandardMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.8 }));
        tank.rotation.x = Math.PI / 2; tank.position.y = 0.1; tank.position.z = -0.1;
        gunGroup.add(tank);
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.12), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        handle.position.y = -0.15; handle.position.z = 0.15;
        gunGroup.add(handle);
        return gunGroup;
    }

    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 40, 150);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(50, 100, 50);
        scene.add(sunLight);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 1.6, 5);

        myGun = createWaterGun();
        scene.add(myGun);
        myGun.visible = false;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const islandGeo = new THREE.CircleGeometry(ISLAND_SIZE, 64);
        const islandMat = new THREE.MeshStandardMaterial({ color: 0xedc9af });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.rotation.x = -Math.PI / 2;
        scene.add(island);

        const waterGeo = new THREE.PlaneGeometry(2000, 2000);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x0077be, transparent: true, opacity: 0.7 });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = -0.5;
        scene.add(water);

        clock = new THREE.Clock();

        window.addEventListener('resize', onWindowResize);
        document.addEventListener('keydown', (e) => updateKey(e.code, true));
        document.addEventListener('keyup', (e) => updateKey(e.code, false));
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mousedown', (e) => {
            if(e.button === 0) shootWater();
        });
        
        renderer.domElement.onclick = () => {
            if (!isGameOver && !isWaiting) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                renderer.domElement.requestPointerLock();
            }
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        await initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userId = user.uid;
                startQueueSystem();
            }
        });

        animate();
    }

    function startQueueSystem() {
        if (!userId) return;
        const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
        
        // 실시간 플레이어 리스트 구독
        onSnapshot(playersCol, (snapshot) => {
            const currentCount = snapshot.size;
            const amIPlaying = snapshot.docs.some(doc => doc.id === userId);
            
            document.getElementById('online-count').innerText = `접속 중인 플레이어: ${currentCount} / ${MAX_PLAYERS}`;

            if (amIPlaying) {
                hideStatus();
                isWaiting = false;
                myGun.visible = true;
            } else {
                if (currentCount < MAX_PLAYERS) {
                    joinGame();
                } else {
                    showStatus("서버가 가득 찼어 (30/30).<br>자리가 나면 자동으로 입장할게!", true);
                    isWaiting = true;
                }
            }

            // 스냅샷 변화에 따라 다른 플레이어들 업데이트
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                if (data.id === userId) return;

                if (change.type === "added") {
                    createOtherPlayer(data);
                } else if (change.type === "modified") {
                    updateOtherPlayer(data);
                } else if (change.type === "removed") {
                    removeOtherPlayer(data.id);
                }
            });
        }, (error) => {
            console.error("Firestore Error:", error);
        });
    }

    async function joinGame() {
        if (!userId) return;
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', userId);
        
        const spawnRange = ISLAND_SIZE * 0.6;
        const startPos = { 
            x: (Math.random()-0.5)*spawnRange, 
            y: 1.6, 
            z: (Math.random()-0.5)*spawnRange 
        };
        
        camera.position.set(startPos.x, startPos.y, startPos.z);

        await setDoc(playerRef, {
            id: userId,
            pos: startPos,
            rot: 0,
            score: 0,
            lastSeen: serverTimestamp()
        });

        // 위치 동기화 루프 시작 (150ms 간격)
        startPositionSync(playerRef);
        
        // 탭을 닫거나 브라우저를 나갈 때 데이터 삭제
        window.addEventListener('beforeunload', () => deleteDoc(playerRef));
    }

    function startPositionSync(playerRef) {
        setInterval(async () => {
            if (isGameOver || isWaiting || !auth.currentUser) return;
            try {
                await updateDoc(playerRef, {
                    pos: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                    rot: yaw,
                    score: score,
                    lastSeen: serverTimestamp()
                });
            } catch (e) {
                console.error("Sync Error", e);
            }
        }, 150);
    }

    function showStatus(msg, showSpinner = false) {
        const el = document.getElementById('status-msg');
        document.getElementById('msg-text').innerHTML = msg;
        document.getElementById('waiting-spinner').style.display = showSpinner ? 'block' : 'none';
        el.style.display = 'block';
    }

    function hideStatus() {
        document.getElementById('status-msg').style.display = 'none';
    }

    function createOtherPlayer(data) {
        if (players[data.id]) return;
        
        const group = new THREE.Group();
        
        // 머리
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
        head.position.y = 1.6;
        group.add(head);
        
        // 몸통
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        body.position.y = 0.8;
        group.add(body);
        
        // 물총
        const gun = createWaterGun();
        gun.position.set(0.3, 1.2, -0.3);
        group.add(gun);
        
        // 초기 위치 설정
        group.position.set(data.pos.x, data.pos.y - 1.6, data.pos.z);
        scene.add(group);
        players[data.id] = group;
    }

    function updateOtherPlayer(data) {
        const playerMesh = players[data.id];
        if (playerMesh) {
            // 위치 보간 (Lerp)으로 부드럽게 이동
            const targetPos = new THREE.Vector3(data.pos.x, data.pos.y - 1.6, data.pos.z);
            playerMesh.position.lerp(targetPos, 0.2);
            playerMesh.rotation.y = data.rot;
        }
    }

    function removeOtherPlayer(id) {
        if (players[id]) {
            scene.remove(players[id]);
            delete players[id];
        }
    }

    function reload() {
        if (isReloading || ammo === MAX_AMMO) return;
        
        isReloading = true;
        const ammoDisplay = document.getElementById('ammo-ui');
        ammoDisplay.innerText = "재장전 중...";
        ammoDisplay.classList.add('reloading');
        playReloadSound();

        setTimeout(() => {
            ammo = MAX_AMMO;
            isReloading = false;
            ammoDisplay.innerText = `탄약: ${ammo} / ${MAX_AMMO}`;
            ammoDisplay.classList.remove('reloading');
        }, 1500);
    }

    function shootWater() {
        if (!document.pointerLockElement || isGameOver || isWaiting) return;
        
        if (isReloading) return;
        if (ammo <= 0) {
            const ammoDisplay = document.getElementById('ammo-ui');
            ammoDisplay.innerText = "탄약 부족! (R키로 재장전)";
            ammoDisplay.classList.add('reloading');
            return;
        }

        ammo--;
        document.getElementById('ammo-ui').innerText = `탄약: ${ammo} / ${MAX_AMMO}`;

        playShootSound();
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        
        // 물줄기 이펙트
        const stream = new THREE.Mesh(
            new THREE.CylinderGeometry(0.04, 0.02, 12, 8), 
            new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.6 })
        );
        stream.position.copy(camera.position).add(dir.clone().multiplyScalar(6));
        stream.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        scene.add(stream);
        setTimeout(() => scene.remove(stream), 60);

        // 레이캐스팅 판정
        const raycaster = new THREE.Raycaster(camera.position, dir);
        const otherPlayerMeshes = Object.values(players);
        const intersects = raycaster.intersectObjects(otherPlayerMeshes, true);
        
        if (intersects.length > 0) {
            score += 10;
            document.getElementById('score-board').innerText = `점수: ${score}`;
        }
    }

    function updateKey(code, isPressed) {
        if (isPressed && code === 'KeyR') {
            reload();
        }

        switch(code) {
            case 'KeyW': moveForward = isPressed; break;
            case 'KeyS': moveBackward = isPressed; break;
            case 'KeyA': moveLeft = isPressed; break;
            case 'KeyD': moveRight = isPressed; break;
        }
    }

    function onMouseMove(event) {
        if (document.pointerLockElement && !isGameOver && !isWaiting) {
            yaw -= event.movementX * 0.002;
            pitch -= event.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isGameOver) { renderer.render(scene, camera); return; }

        const delta = clock.getDelta();
        const speed = 7;

        if (document.pointerLockElement && !isWaiting) {
            const dir = new THREE.Vector3();
            if (moveForward) dir.z -= 1;
            if (moveBackward) dir.z += 1;
            if (moveLeft) dir.x -= 1;
            if (moveRight) dir.x += 1;
            
            dir.normalize().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw));
            camera.position.add(dir.multiplyScalar(speed * delta));
            
            // 섬 경계 및 낙사 판정
            const distFromCenter = Math.sqrt(camera.position.x**2 + camera.position.z**2);
            if (distFromCenter > ISLAND_SIZE) {
                if (camera.position.y === 1.6) playSplashSound();
                camera.position.y -= 0.15;
                if (camera.position.y < -3) {
                    showStatus("첨벙! 탈락했어. 새로고침해서 대기열에 다시 합류해!");
                    isGameOver = true;
                    if (userId) {
                        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', userId);
                        deleteDoc(playerRef);
                    }
                    document.exitPointerLock();
                }
            } else { 
                camera.position.y = 1.6; 
            }

            camera.rotation.set(0, 0, 0);
            camera.rotateY(yaw); 
            camera.rotateX(pitch);

            if (myGun) {
                myGun.position.copy(camera.position);
                myGun.quaternion.copy(camera.quaternion);
                myGun.translateZ(-0.4); 
                myGun.translateX(0.25); 
                myGun.translateY(-0.25);
                
                if (isReloading) {
                    myGun.position.y += Math.sin(Date.now() * 0.01) * 0.02;
                }
            }
        }
        renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
