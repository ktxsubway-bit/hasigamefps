<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>벨튀 서바이벌 (Ding-Dong Run)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffcc80;
            color: #333;
            font-family: 'CookieRun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 60vh;
            background: linear-gradient(to bottom, #81d4fa, #e0f7fa);
            border: 6px solid #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 상단 UI */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 5;
        }

        .stat-box {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00838f;
            border: 3px solid #00bcd4;
            box-shadow: 0 4px 0px rgba(0, 188, 212, 0.3);
        }

        /* 하단 컨트롤러 */
        #controls {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            gap: 15px;
            z-index: 5;
        }

        .action-btn {
            flex: 1;
            height: 80px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px rgba(0,0,0,0.2);
        }

        .action-btn:disabled {
            filter: grayscale(100%) opacity(0.5);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1) !important;
        }

        #btn-ring {
            background-color: #ffeb3b;
            color: #f57f17;
            box-shadow: 0 8px 0px #f57f17;
            border: 4px solid #fff;
        }

        #btn-run {
            background-color: #ff5252;
            color: #fff;
            box-shadow: 0 8px 0px #d32f2f;
            border: 4px solid #fff;
        }

        /* 오버레이 (시작, 결과 화면) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        h1 {
            color: #00838f;
            margin-bottom: 10px;
            font-size: 3rem;
            text-shadow: 2px 2px 0px #b2ebf2;
        }

        p {
            color: #555;
            margin-bottom: 25px;
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: bold;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #00bcd4;
            color: white;
            border: 4px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0px #00838f;
        }

        .start-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #00838f;
        }

        /* 긴장감 텍스트 */
        #alert-text {
            position: absolute;
            top: 30%;
            width: 100%;
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            color: #ff5252;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 8;
        }

        #alert-text.show {
            opacity: 1;
            transform: scale(1);
        }

        /* 덜컹거림 효과 */
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
       
        <div id="ui-layer">
            <div class="stat-box">거리: <span id="distance">0</span>m</div>
            <div class="stat-box">레벨: <span id="level">1</span></div>
        </div>

        <div id="alert-text">누구야?!</div>

        <!-- 시작 화면 -->
        <div id="start-screen" class="overlay">
            <h1>🏃‍♂️ 벨튀 서바이벌</h1>
            <p>
                <span style="color:#f57f17;">[딩동!]</span>을 누르고 문이 열리기 전에<br>
                <span style="color:#d32f2f;">[도망쳐!]</span>를 <strong>미친듯이 연타</strong>하세요!<br><br>
                안전선(깃발 🚩)을 넘으면 성공!
            </p>
            <button class="start-btn" id="start-btn">시작하기 (소리 켜기)</button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="overlay" style="display: none;">
            <h1 id="result-title" style="color: #ff5252;">잡혔다! 😱</h1>
            <p id="result-desc">집주인에게 딱 걸렸습니다...</p>
            <button class="start-btn" id="restart-btn">다시 도전</button>
        </div>
    </div>

    <div id="controls">
        <button class="action-btn" id="btn-ring">딩동! 🔔</button>
        <button class="action-btn" id="btn-run" disabled>도망쳐! 🏃💨</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const distanceDisplay = document.getElementById('distance');
        const levelDisplay = document.getElementById('level');
        const alertText = document.getElementById('alert-text');
       
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');
       
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const btnRing = document.getElementById('btn-ring');
        const btnRun = document.getElementById('btn-run');

        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 400;

        // --- 오디오 시스템 (Web Audio API) ---
        let audioCtx;
       
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
           
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
           
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 딩동 소리
        function playDingDong() {
            playTone(659.25, 'sine', 0.5, 0.5); // E5
            setTimeout(() => playTone(523.25, 'sine', 0.8, 0.5), 400); // C5
        }

        // 발소리 (타다닥)
        function playFootstep() {
            playTone(150 + Math.random()*50, 'triangle', 0.1, 0.2);
        }

        // 문 벌컥 & 화내는 소리
        function playAngry() {
            // 문 열리는 쾅 소리
            playTone(100, 'square', 0.3, 1);
            // 화내는 호루라기 같은 소리
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }, 100);
        }

        // 성공 소리
        function playSuccess() {
            playTone(440, 'sine', 0.1, 0.3);
            setTimeout(() => playTone(554, 'sine', 0.1, 0.3), 100);
            setTimeout(() => playTone(659, 'sine', 0.3, 0.3), 200);
        }


        // --- 게임 상태 및 로직 ---
        let isGameRunning = false;
        let animationId;
        let lastTime = 0;
        let level = 1;
        let gameState = 'idle'; // 'idle', 'ringing', 'running', 'done'
       
        let doorTimer = 0;
        let doorOpenTime = 2.5; // 집주인이 문 여는 데 걸리는 시간 (레벨 오를수록 감소)

        const SAFE_DISTANCE = 100; // 안전거리 100m
        let distance = 0;

        // 카메라 (화면 스크롤)
        let cameraX = 0;

        // 객체
        const player = { x: 80, y: 300, size: 60, emoji: '🏃', wobble: 0 };
        const door = { x: 50, y: 300, width: 80, height: 120, state: 'closed', shake: false };
        const owner = { x: 50, y: 300, size: 60, emoji: '😠' };
       
        let dustParticles = [];

        function initGame(resetLevel = true) {
            initAudio(); // 오디오 컨텍스트 초기화
            if (resetLevel) level = 1;
           
            distance = 0;
            doorTimer = 0;
            doorOpenTime = Math.max(0.8, 2.5 - (level * 0.2)); // 최소 0.8초까지 짧아짐
           
            gameState = 'idle';
            player.x = 80;
            cameraX = 0;
            door.state = 'closed';
            door.shake = false;
            dustParticles = [];
           
            updateUI();
           
            btnRing.disabled = false;
            btnRun.disabled = true;
            alertText.classList.remove('show');
            document.getElementById('game-container').classList.remove('shake');
           
            startScreen.style.display = 'none';
            resultScreen.style.display = 'none';
           
            isGameRunning = true;
            lastTime = performance.now();
            cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            distanceDisplay.innerText = Math.floor(distance);
            levelDisplay.innerText = level;
        }

        function triggerRing() {
            if (gameState !== 'idle') return;
           
            playDingDong();
            gameState = 'ringing';
            btnRing.disabled = true;
           
            // 딩동 소리 후 0.5초 뒤부터 도망가기 가능
            setTimeout(() => {
                if(isGameRunning) {
                    gameState = 'running';
                    btnRun.disabled = false;
                    door.shake = true; // 문이 덜컹거림
                   
                    // 스페이스바도 지원
                    window.addEventListener('keydown', handleSpacebar);
                }
            }, 500);
        }

        function handleSpacebar(e) {
            if (e.code === 'Space' && gameState === 'running') {
                e.preventDefault();
                triggerRun();
            }
        }

        function triggerRun() {
            if (gameState !== 'running') return;
           
            playFootstep();
           
            // 한번 누를 때마다 거리가 증가하고, 플레이어가 앞으로 감
            let runAmount = 2.5 + (Math.random() * 1);
            distance += runAmount;
            player.x += runAmount * 5; // 화면상 좌표 이동
            player.wobble += Math.PI / 4; // 씰룩씰룩
           
            // 먼지 파티클
            for(let i=0; i<2; i++) {
                dustParticles.push({
                    x: player.x - 20, y: player.y + 20,
                    vx: -20 - Math.random()*50, vy: -10 - Math.random()*20,
                    life: 0.5, size: 5 + Math.random()*10
                });
            }

            updateUI();

            // 목표 달성 확인
            if (distance >= SAFE_DISTANCE) {
                gameWin();
            }
        }

        btnRing.addEventListener('mousedown', (e) => { e.preventDefault(); triggerRing(); });
        btnRing.addEventListener('touchstart', (e) => { e.preventDefault(); triggerRing(); }, {passive: false});

        btnRun.addEventListener('mousedown', (e) => { e.preventDefault(); triggerRun(); });
        btnRun.addEventListener('touchstart', (e) => { e.preventDefault(); triggerRun(); }, {passive: false});

        function gameWin() {
            gameState = 'done';
            btnRun.disabled = true;
            window.removeEventListener('keydown', handleSpacebar);
           
            playSuccess();
           
            resultTitle.innerText = "성공! 🎉";
            resultTitle.style.color = "#00bcd4";
            resultDesc.innerText = "무사히 도망쳤습니다!\n(다음 레벨은 더 빨리 나옵니다)";
            resultScreen.style.display = 'flex';
           
            restartBtn.innerText = "다음 레벨로";
            restartBtn.onclick = () => initGame(false); // 레벨 유지하고 재시작
        }

        function gameLose() {
            gameState = 'done';
            btnRun.disabled = true;
            door.shake = false;
            door.state = 'open';
            window.removeEventListener('keydown', handleSpacebar);
           
            playAngry();
           
            // 시각 효과
            document.getElementById('game-container').classList.add('shake');
            alertText.innerText = "거기 안 서?! 💢";
            alertText.classList.add('show');
           
            setTimeout(() => {
                resultTitle.innerText = "잡혔다! 😱";
                resultTitle.style.color = "#ff5252";
                resultDesc.innerText = "딱 걸렸습니다. 엄청 혼났습니다...";
                resultScreen.style.display = 'flex';
                restartBtn.innerText = "처음부터 다시";
                restartBtn.onclick = () => initGame(true);
            }, 1500);
        }


        function update(deltaTime) {
            if (gameState === 'running') {
                // 문 여는 타이머 증가
                doorTimer += deltaTime;
               
                // 플레이어가 안 뛰고 있으면 거리가 조금씩 줄어듦 (뒤로 밀림 방지 차원)
                // distance = Math.max(0, distance - 2 * deltaTime);
               
                if (doorTimer >= doorOpenTime) {
                    gameLose();
                }
            }

            // 카메라가 플레이어를 따라감 (플레이어가 화면 중앙을 넘어서면)
            let targetCamX = Math.max(0, player.x - CANVAS_WIDTH / 3);
            cameraX += (targetCamX - cameraX) * 10 * deltaTime;

            // 먼지 파티클
            for (let i = dustParticles.length - 1; i >= 0; i--) {
                let p = dustParticles[i];
                p.x += p.vx * deltaTime;
                p.y += p.vy * deltaTime;
                p.life -= deltaTime;
                if (p.life <= 0) dustParticles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.save();
            ctx.translate(-cameraX, 0);

            // 배경 (바닥, 벽)
            ctx.fillStyle = '#cfd8dc'; // 벽
            ctx.fillRect(0, 0, CANVAS_WIDTH + 2000, 320);
            ctx.fillStyle = '#90a4ae'; // 바닥 보도블록
            ctx.fillRect(0, 320, CANVAS_WIDTH + 2000, 80);

            // 보도블록 선
            ctx.strokeStyle = '#78909c';
            ctx.lineWidth = 2;
            for(let i=0; i<CANVAS_WIDTH + 2000; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 320); ctx.lineTo(i-30, 400); ctx.stroke();
            }

            // 1. 문 (Door) 그리기
            ctx.save();
            if (door.shake) {
                ctx.translate((Math.random()-0.5)*4, 0); // 덜컹거림
            }
           
            ctx.fillStyle = '#795548'; // 문틀
            ctx.fillRect(door.x - 10, door.y - door.height - 10, door.width + 20, door.height + 10);
           
            if (door.state === 'closed') {
                ctx.fillStyle = '#8d6e63'; // 문
                ctx.fillRect(door.x, door.y - door.height, door.width, door.height);
                ctx.fillStyle = '#f1c40f'; // 손잡이
                ctx.beginPath(); ctx.arc(door.x + door.width - 15, door.y - door.height/2, 5, 0, Math.PI*2); ctx.fill();
               
                // 초인종
                ctx.fillStyle = '#eeeeee';
                ctx.fillRect(door.x + door.width + 20, door.y - door.height/2 - 10, 15, 20);
                ctx.fillStyle = gameState === 'idle' ? '#ff5252' : '#d32f2f'; // 누르면 진해짐
                ctx.beginPath(); ctx.arc(door.x + door.width + 27.5, door.y - door.height/2, 4, 0, Math.PI*2); ctx.fill();
            } else {
                // 문 열림 (어두운 실내)
                ctx.fillStyle = '#000';
                ctx.fillRect(door.x, door.y - door.height, door.width, door.height);
               
                // 집주인 화난 이모지
                ctx.font = '60px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(owner.emoji, door.x + door.width/2, door.y);
            }
            ctx.restore();

            // 2. 안전선 (도착 지점 깃발)
            let finishX = 80 + (SAFE_DISTANCE * 5); // 시작점 + 거리비율
            ctx.fillStyle = '#fff';
            ctx.fillRect(finishX, 220, 5, 100);
            ctx.fillStyle = '#ff5252';
            ctx.beginPath(); ctx.moveTo(finishX, 220); ctx.lineTo(finishX + 40, 240); ctx.lineTo(finishX, 260); ctx.fill();
            ctx.font = '20px Arial'; ctx.fillStyle = '#000';
            ctx.fillText('SAFE ZONE', finishX + 20, 210);

            // 3. 파티클
            for (let p of dustParticles) {
                ctx.fillStyle = `rgba(200, 200, 200, ${p.life * 2})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }

            // 4. 플레이어
            ctx.save();
            ctx.translate(player.x, player.y);
            if (gameState === 'running' || gameState === 'done') {
                ctx.rotate(Math.sin(player.wobble) * 0.3); // 뛰는 폼
                ctx.translate(0, -Math.abs(Math.sin(player.wobble)*10)); // 뜀박질 위아래
            }
            ctx.font = `${player.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            // 잡히면 울고, 도망가면 땀흘림
            let pEmoji = player.emoji;
            if (gameState === 'done') {
                pEmoji = door.state === 'open' ? '😭' : '😎';
            }
            ctx.fillText(pEmoji, 0, 0);
            ctx.restore();

            ctx.restore(); // 카메라 복구

            // 긴장감 연출 (문이 열리기 직전에 화면 가장자리가 빨개짐)
            if (gameState === 'running') {
                let dangerLevel = doorTimer / doorOpenTime;
                if (dangerLevel > 0.7) {
                    ctx.fillStyle = `rgba(255, 0, 0, ${(dangerLevel - 0.7) * 0.5})`;
                    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                }
            }
        }

        function gameLoop(currentTime) {
            if (!isGameRunning) return;

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (deltaTime < 0.2) {
                update(deltaTime);
                draw();
            }

            if (isGameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // 이벤트 초기화
        startBtn.addEventListener('click', () => initGame(true));
       
        // 폰트 및 초기 로드 대기
        window.onload = () => {
            initAudio(); // 권한 요구될 수 있으므로 클릭 시점에 다시 호출
            draw();
        };

    </script>
</body>
</html>
