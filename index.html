<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1930s Jungang Line: Optimized Performance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #a7d8ff; font-family: 'Pretendard', sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        #ui-overlay { position: absolute; bottom: env(safe-area-inset-bottom, 20px); left: 50%; transform: translateX(-50%); color: #2d2d2d; pointer-events: none; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); z-index: 20; text-align: center; }
        
        .v-control { position: absolute; bottom: 40px; width: 60px; height: 220px; background: rgba(255,255,255,0.3); border: 2px solid rgba(0,0,0,0.1); border-radius: 30px; pointer-events: auto; touch-action: none; display: flex; flex-direction: column-reverse; align-items: center; padding: 10px 0; box-sizing: border-box; backdrop-filter: blur(5px); }
        #power-ctrl { left: 30px; }
        #brake-ctrl { right: 30px; }
        .v-handle { width: 44px; height: 44px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: absolute; left: 6px; bottom: 10px; cursor: pointer; }
        #power-handle { background: linear-gradient(135deg, #8b4513, #3e2723); }
        #brake-handle { background: linear-gradient(135deg, #b71c1c, #7f0000); }
        .ctrl-label { position: absolute; top: -30px; width: 100%; text-align: center; font-size: 10px; font-weight: bold; color: #444; letter-spacing: 1px; }

        #speed-text { font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 900; color: #3e2723; font-variant-numeric: tabular-nums; line-height: 1; }
        #station-info { position: absolute; top: 85px; width: 100%; text-align: center; color: #2d2d2d; pointer-events: none; z-index: 20; }
        
        #start-overlay { position: fixed; inset: 0; background: #fdf5e6; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #3e2723; z-index: 1000; text-align: center; padding: 20px; transition: opacity 0.5s ease; }
        .start-box { border: 4px double #8b4513; padding: 40px; border-radius: 4px; background: #fffaf0; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        #loading-indicator { display: none; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #8b451322; border-top: 4px solid #8b4513; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .touch-btn { pointer-events: auto; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); border: 1px solid rgba(0,0,0,0.2); border-radius: 8px; color: #3e2723; padding: 10px; font-weight: bold; cursor: pointer; }
        .active-mode { background: #8b4513 !important; color: #fff !important; }
        
        #view-btns { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; pointer-events: auto; z-index: 30; }
        .view-btn { width: 40px; height: 40px; font-size: 14px; }
        
        #status-panel { position: absolute; top: 20px; left: 20px; z-index: 30; display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        
        #speed-limit-sign { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #fff; border: 4px solid red; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; color: black; font-weight: 900; font-size: 1.4rem; z-index: 40; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="start-box" id="start-content">
            <h1 class="text-4xl font-serif font-black mb-4 text-sepia-900 tracking-tight">VINTAGE 1930</h1>
            <p class="text-lg mb-2 text-stone-700 font-bold">중앙선 최적화 버전</p>
            <p class="text-sm text-stone-500 mb-8 max-w-xs mx-auto">우보 - 화본 - 봉림 마을 구간</p>
            <button onclick="startEngine()" class="text-white bg-stone-800 px-8 py-3 rounded font-bold tracking-widest uppercase hover:bg-black transition-colors">운행 시작</button>
        </div>
        <div id="loading-indicator">
            <div class="spinner"></div>
            <p class="text-stone-700 font-bold tracking-widest">청크 로딩 및 엔진 예열 중...</p>
        </div>
    </div>

    <div id="speed-limit-sign">60</div>

    <div id="power-ctrl" class="v-control">
        <div class="ctrl-label">가속</div>
        <div id="power-handle" class="v-handle"></div>
    </div>

    <div id="brake-ctrl" class="v-control">
        <div class="ctrl-label">제동</div>
        <div id="brake-handle" class="v-handle"></div>
    </div>

    <div id="status-panel">
        <div id="mode-btn" class="touch-btn px-4 py-2 text-xs" onclick="toggleAI()">자동운전: 꺼짐</div>
    </div>

    <div id="view-btns">
        <div class="touch-btn view-btn flex items-center justify-center" onclick="setView(1)">1</div>
        <div class="touch-btn view-btn flex items-center justify-center" onclick="setView(2)">2</div>
        <div class="touch-btn view-btn flex items-center justify-center" onclick="setView(3)">3</div>
    </div>

    <div id="station-info">
        <div id="next-station-name" class="font-bold text-xl text-stone-800">시뮬레이션 준비 완료</div>
        <div id="station-dist" class="text-xs text-stone-500 tracking-widest mt-1 uppercase">신호를 기다리는 중...</div>
    </div>

    <div id="ui-overlay">
        <div id="speed-text">0 <span class="text-xl text-stone-400 font-medium">km/h</span></div>
        <div class="mt-4 flex flex-col items-center gap-3 pointer-events-auto">
            <div id="ats-status" class="px-6 py-1 text-[10px] font-bold text-stone-700 bg-white/80 rounded-full border border-stone-300 shadow-sm uppercase tracking-wider">주행 가능</div>
            <div class="touch-btn px-8 py-1.5 text-[10px] bg-red-800 text-white border-none" onclick="emergencyBrake()">비상 제동</div>
        </div>
    </div>

    <script>
        let audioCtx, engineOsc, engineGain;
        let isEngineStarted = false;

        function startEngine() {
            if (isEngineStarted) return;
            document.getElementById('start-content').style.display = 'none';
            document.getElementById('loading-indicator').style.display = 'flex';

            setTimeout(() => {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    engineOsc = audioCtx.createOscillator();
                    engineOsc.type = 'square';
                    engineOsc.frequency.setValueAtTime(25, audioCtx.currentTime);
                    engineGain = audioCtx.createGain();
                    engineGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                    const lpf = audioCtx.createBiquadFilter();
                    lpf.type = 'lowpass';
                    lpf.frequency.setValueAtTime(150, audioCtx.currentTime);
                    engineOsc.connect(lpf);
                    lpf.connect(engineGain);
                    engineGain.connect(audioCtx.destination);
                    engineOsc.start();
                    
                    document.getElementById('start-overlay').style.opacity = '0';
                    setTimeout(() => { document.getElementById('start-overlay').style.display = 'none'; }, 500);
                    isEngineStarted = true;
                } catch (e) {
                    document.getElementById('start-overlay').style.display = 'none';
                    isEngineStarted = true;
                }
            }, 800);
        }

        function updateSound(notch, speed) {
            if (!isEngineStarted || !engineOsc) return;
            const targetFreq = 22 + (notch * 8) + (speed * 0.1);
            const targetVol = 0.02 + (notch * 0.04);
            engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.5);
            engineGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.5);
        }

        const STATIONS = [
            { name: "우보정거장 (Ubo)", pos: 2000, type: 'stop', stopTime: 8 },
            { name: "화본정거장 (Hwabon)", pos: 8000, type: 'stop', stopTime: 10, hasWaterTower: true },
            { name: "봉림정거장 (Bongrim)", pos: 14000, type: 'stop', stopTime: 8 }
        ];

        let speed_kph = 0, power_notch = 0, brake_notch = 0, distance_m = 0;
        let viewMode = 1, lastTime = performance.now();
        let isAI = false;
        let currentLimit = 60;
        let stopTimer = 0;
        let isStoppedAtStation = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa7d8ff);
        
        // 최적화: 안개 범위를 더 가깝게 좁힘 (300m ~ 1500m)
        scene.fog = new THREE.Fog(0xa7d8ff, 300, 1500); 

        // 최적화: 카메라의 가시 거리를 15,000에서 2,000으로 대폭 단축
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // 최적화: 안티앨리어싱 끔 (렉 방지)
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // 최적화: 픽셀 배수 제한
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sun.position.set(100, 200, 50);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xddeeff, 0.6));

        const train = new THREE.Group();
        const loco = new THREE.Group();
        const vintageGreen = new THREE.MeshStandardMaterial({ color: 0x1a3a1a });
        const rustyBrown = new THREE.MeshStandardMaterial({ color: 0x4a3a2a });
        const brassMat = new THREE.MeshStandardMaterial({ color: 0xaa8833 });

        loco.add(new THREE.Mesh(new THREE.BoxGeometry(3.0, 3.0, 10), vintageGreen));
        loco.children[0].position.y = 2.1;
        const roof = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.5, 10.5), rustyBrown);
        roof.position.y = 3.8; loco.add(roof);
        const nose = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.5, 2.0), vintageGreen);
        nose.position.set(0, 1.8, -6.0); loco.add(nose);
        const chimney = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.5), brassMat);
        chimney.position.set(0, 4.5, -5); loco.add(chimney);
        train.add(loco);

        const coaches = new THREE.Group();
        const coachMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
        for(let i=1; i<=3; i++) {
            const cGroup = new THREE.Group();
            const coachBody = new THREE.Mesh(new THREE.BoxGeometry(3.0, 3.2, 18), coachMat);
            coachBody.position.y = 2.1; cGroup.add(coachBody);
            cGroup.position.z = 15 + (i * 20); coaches.add(cGroup);
        }
        train.add(coaches);
        scene.add(train);

        const sleeperMat = new THREE.MeshStandardMaterial({ color: 0x2b1d0e });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x224422 });
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xfaf0e6 });
        const thatchMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
        const tileMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

        function createHouse(x, z, type='thatch') {
            const hGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 4), wallMat);
            body.position.y = 1.5; hGroup.add(body);
            const roof = type === 'thatch' 
                ? new THREE.Mesh(new THREE.CylinderGeometry(0.1, 4, 2, 4), thatchMat)
                : new THREE.Mesh(new THREE.CylinderGeometry(0.1, 4, 1.5, 4), tileMat);
            roof.position.y = 3.5; roof.rotation.y = Math.PI / 4; hGroup.add(roof);
            hGroup.position.set(x, 0, z); scene.add(hGroup);
        }

        function createTree(x, z) {
            const tGroup = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 5), sleeperMat);
            trunk.position.y = 2.5; tGroup.add(trunk);
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(3.5, 6, 6), leafMat); // 최적화: 세그먼트 감소
            leaves.position.y = 6; tGroup.add(leaves);
            tGroup.position.set(x, 0, z); scene.add(tGroup);
        }

        function buildWorld() {
            const railMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5d4e3b });
            
            // 최적화: 전체 데이터를 생성하되, 지오메트리 복잡도를 최소화함
            for (let z = -2000; z < 16000; z += 500) {
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 500), groundMat);
                ground.rotation.x = -Math.PI/2; ground.position.set(0, -0.1, -z); scene.add(ground);
                
                const r1 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 500), railMat);
                r1.position.set(-0.72, 0.1, -z); scene.add(r1);
                const r2 = r1.clone(); r2.position.x = 0.72; scene.add(r2);

                // 최적화: 침목 간격을 넓힘 (1.2m -> 2.5m)
                for(let sz = z-250; sz < z+250; sz += 2.5) {
                    const sleeper = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.12, 0.4), sleeperMat);
                    sleeper.position.set(0, 0.05, -sz); scene.add(sleeper);
                }

                // 최적화: 나무 개수를 줄임 (15개 -> 8개)
                for(let i=0; i<8; i++) {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    createTree((15 + Math.random() * 40) * side, -z - Math.random() * 500);
                }
                if(z % 2000 === 0) { createHouse(25, -z - 100, 'thatch'); createHouse(-30, -z - 300, 'tile'); }
            }
            
            STATIONS.forEach(s => {
                const sp = -s.pos;
                const plat = new THREE.Mesh(new THREE.BoxGeometry(8, 0.8, 250), new THREE.MeshStandardMaterial({color: 0x3e2723}));
                plat.position.set(7, 0.4, sp); scene.add(plat);
                const sBody = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 25), wallMat);
                sBody.position.set(15, 3, sp); scene.add(sBody);
            });
        }

        function setupTouchControl(containerId, handleId, onUpdate) {
            const container = document.getElementById(containerId);
            const handle = document.getElementById(handleId);
            let isDragging = false;
            const updatePos = (clientY) => {
                const rect = container.getBoundingClientRect();
                let y = Math.max(20, Math.min(clientY - rect.top, rect.height - 20));
                handle.style.top = (y - 22) + "px";
                onUpdate(1 - (y - 20) / (rect.height - 40));
            };
            container.addEventListener('touchstart', (e) => { 
                if(!isEngineStarted) return;
                isDragging = true; isAI = false; updatePos(e.touches[0].clientY); 
            }, {passive: false});
            container.addEventListener('touchmove', (e) => { 
                if (isDragging) { e.preventDefault(); updatePos(e.touches[0].clientY); } 
            }, {passive: false});
            window.addEventListener('touchend', () => isDragging = false);
        }

        setupTouchControl('power-ctrl', 'power-handle', (v) => { power_notch = v * 8; if(v>0) brake_notch=0; });
        setupTouchControl('brake-ctrl', 'brake-handle', (v) => { brake_notch = v * 12; if(v>0) power_notch=0; });

        function toggleAI() {
            if(!isEngineStarted) return;
            isAI = !isAI;
            document.getElementById('mode-btn').innerText = isAI ? "자동운전: 켜짐" : "자동운전: 꺼짐";
            document.getElementById('mode-btn').classList.toggle('active-mode', isAI);
        }

        function setView(v) { viewMode = v; }
        function emergencyBrake() { isAI = false; power_notch = 0; brake_notch = 15; }

        function update(dt) {
            const nearStation = STATIONS.find(s => Math.abs(distance_m - s.pos) < 600);
            currentLimit = nearStation ? 40 : 80;
            document.getElementById('speed-limit-sign').innerText = currentLimit;

            if (isAI) {
                const nextStation = STATIONS.find(s => s.pos > distance_m - 20);
                if (nextStation) {
                    const dist = nextStation.pos - distance_m;
                    if (Math.abs(dist) < 20 && speed_kph < 3) {
                        isStoppedAtStation = true;
                        speed_kph = 0; power_notch = 0; brake_notch = 8;
                        stopTimer += dt;
                        if (stopTimer >= nextStation.stopTime) {
                            isStoppedAtStation = false;
                            stopTimer = 0;
                            power_notch = 7; brake_notch = 0;
                            distance_m += 25; 
                        }
                    } 
                    else if (dist < 450 && dist > -20 && !isStoppedAtStation) {
                        power_notch = 0;
                        const targetSpeed = Math.sqrt(Math.max(0, dist)) * 2.2;
                        if (speed_kph > targetSpeed + 5) brake_notch = 7;
                        else if (speed_kph > targetSpeed) brake_notch = 3;
                        else if (speed_kph < targetSpeed - 10) {
                            brake_notch = 0;
                            if (speed_kph < 5) power_notch = 1;
                        } else brake_notch = 1;
                    } 
                    else {
                        brake_notch = 0;
                        if (speed_kph < currentLimit - 2) power_notch = 7;
                        else if (speed_kph > currentLimit) { power_notch = 0; brake_notch = 2; }
                        else power_notch = 2;
                    }
                }
                document.getElementById('power-handle').style.top = (180 - (power_notch/8)*160) + "px";
                document.getElementById('brake-handle').style.top = (180 - (brake_notch/12)*160) + "px";
            }

            let acc = (power_notch * 0.18) - (brake_notch * 0.52) - (speed_kph * 0.015);
            speed_kph = Math.max(0, speed_kph + acc * dt);
            distance_m += (speed_kph / 3.6) * dt;
            
            train.position.z = -distance_m;

            // 카메라 세팅 및 오브젝트 가시성 최적화
            if(viewMode === 1) {
                loco.visible = false; coaches.visible = false;
                camera.position.set(0, 3.8, -distance_m - 6.0);
                camera.lookAt(0, 3.5, -distance_m - 500);
            } else if(viewMode === 2) {
                loco.visible = true; coaches.visible = true;
                camera.position.set(20, 10, -distance_m + 30);
                camera.lookAt(0, 2, -distance_m);
            } else {
                loco.visible = true; coaches.visible = true;
                camera.position.set(-15, 6, -distance_m - 40);
                camera.lookAt(train.position);
            }

            document.getElementById('speed-text').innerHTML = Math.round(speed_kph) + ' <span class="text-lg text-stone-400">km/h</span>';
            const next = STATIONS.find(s => s.pos > distance_m - 20);
            if(next) {
                const distToNext = Math.max(0, Math.round(next.pos - distance_m));
                document.getElementById('next-station-name').innerText = `다음 정거장: ${next.name}`;
                document.getElementById('station-dist').innerText = (distToNext < 20 && speed_kph < 1) 
                    ? `정차 중... (${Math.ceil(next.stopTime - stopTimer)}초)` 
                    : `남은 거리: ${distToNext}M`;
            }
            updateSound(power_notch, speed_kph);
        }

        function animate() {
            const now = performance.now();
            update(Math.min((now - lastTime)/1000, 0.1));
            lastTime = now;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onload = () => { buildWorld(); animate(); };
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
